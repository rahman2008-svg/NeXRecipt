name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # 🔥 FIX: ensure Gradle wrapper permission
    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew

    # 🔥 FIX: clean cache safe build (important for your errors)
    - name: Clean Gradle Cache (force fresh build)
      run: ./gradlew clean --no-daemon

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Build Release Bundle
      run: ./gradlew bundleRelease --stacktrace

    # 🔥 Upload Debug APK (safe path fix)
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: nexreceipt-pro-debug-apk
        path: app/build/outputs/apk/debug/*.apk

    # 🔥 Upload Release AAB
    - name: Upload Release AAB
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: nexreceipt-pro-release-bundle
        path: app/build/outputs/bundle/release/*.aab
