workflows:
  android-native:
    name: NexReceipt Pro Native Build
    max_build_duration: 60

    instance_type: mac_mini_m2

    environment:
      groups:
        - keystore_vars

      vars:
        PACKAGE_NAME: "com.aistudio.nexreceipt.pro"

      java: 17

    triggering:
      events:
        - push
        - pull_request

      branch_patterns:
        - pattern: "main"
          include: true
        - pattern: "master"
          include: true

    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper

    scripts:
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Grant execute permission
        script: |
          chmod +x gradlew

      - name: Clean project
        script: |
          ./gradlew clean

      - name: Build Debug APK
        script: |
          ./gradlew assembleDebug --stacktrace

    artifacts:
      - app/build/outputs/apk/debug/*.apk
      - app/build/outputs/**/*.aab
      - app/build/reports/**/*
