workflows:
  android-native:
    name: NexReceipt Pro Native Build
    max_build_duration: 60
    instance_type: mac_mini
    environment:
      groups:
        - keystore_vars
      vars:
        PACKAGE_NAME: "com.aistudio.nexreceipt.pro"
      java: 17
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: 'main'
        - pattern: 'master'
    scripts:
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
      - name: Build Debug APK
        script: |
          chmod +x gradlew
          ./gradlew clean assembleDebug
    artifacts:
      - app/build/outputs/apk/debug/*.apk
