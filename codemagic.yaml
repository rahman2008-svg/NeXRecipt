workflows:
android-native:
name: NexReceipt Pro Native Build
max_build_duration: 60

instance_type: linux_x2

environment:
  groups:
    - keystore_vars

  vars:
    PACKAGE_NAME: "com.aistudio.nexreceipt.pro"

  java: 17

triggering:
  events:
    - push
    - pull_request

  branch_patterns:
    - pattern: "main"
    - pattern: "master"

cache:
  cache_paths:
    - ~/.gradle/caches
    - ~/.gradle/wrapper

scripts:
  - name: Set up local.properties
    script: |
      echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

  - name: Grant Execute Permission
    script: |
      chmod +x gradlew

  - name: Build Debug APK
    script: |
      ./gradlew clean assembleDebug --stacktrace

artifacts:
  - app/build/outputs/apk/debug/*.apk
